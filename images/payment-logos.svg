<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 36" width="380" height="36">
  <defs>
    <style>
      text { font-family: Arial, Helvetica, sans-serif; }
    </style>
  </defs>

  <!-- VISA -->
  <rect x="0" y="0" width="54" height="36" rx="5" fill="#fff" stroke="#d9d9d9" stroke-width="1"/>
  <text x="27" y="25" font-size="16" font-weight="900" font-style="italic" fill="#1A1F71" text-anchor="middle">VISA</text>

  <!-- Mastercard -->
  <rect x="60" y="0" width="54" height="36" rx="5" fill="#fff" stroke="#d9d9d9" stroke-width="1"/>
  <circle cx="81" cy="18" r="11" fill="#EB001B"/>
  <circle cx="93" cy="18" r="11" fill="#F79E1B"/>
  <path d="M87 9.4A11 11 0 0 1 87 26.6A11 11 0 0 1 87 9.4Z" fill="#FF5F00"/>

  <!-- Mastercard 2 / Maestro -->
  <rect x="120" y="0" width="54" height="36" rx="5" fill="#fff" stroke="#d9d9d9" stroke-width="1"/>
  <circle cx="141" cy="18" r="11" fill="#EB001B"/>
  <circle cx="153" cy="18" r="11" fill="#0099DF"/>
  <path d="M147 9.4A11 11 0 0 1 147 26.6A11 11 0 0 1 147 9.4Z" fill="#7B02A8"/>

  <!-- PayPal -->
  <rect x="180" y="0" width="54" height="36" rx="5" fill="#fff" stroke="#d9d9d9" stroke-width="1"/>
  <text x="196" y="16" font-size="12" font-weight="900" fill="#009CDE" text-anchor="middle">P</text>
  <text x="204" y="16" font-size="12" font-weight="900" fill="#003087" text-anchor="middle">P</text>
  <text x="207" y="28" font-size="7" font-weight="600" fill="#253B80" text-anchor="middle">PayPal</text>

  <!-- AMEX -->
  <rect x="240" y="0" width="54" height="36" rx="5" fill="#016FD0"/>
  <text x="267" y="22" font-size="11" font-weight="800" fill="#fff" text-anchor="middle" letter-spacing="0.5">AMEX</text>

  <!-- Klarna -->
  <rect x="300" y="0" width="54" height="36" rx="5" fill="#FFB3C7"/>
  <text x="327" y="23" font-size="12" font-weight="700" fill="#1A1A1A" text-anchor="middle">Klarna</text>

</svg>
